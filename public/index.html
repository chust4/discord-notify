<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d1117" />
    <title>Discord Notify</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔔</text></svg>" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-logo">🔔</span>
          <div>
            <div class="brand-name">Discord Notify</div>
            <div class="brand-sub" id="brand-version">v1.0.0</div>
          </div>
        </div>
        <nav class="nav">
          <a href="#/" data-route="dashboard"><span>🏠</span> Dashboard</a>
          <a href="#/servers" data-route="servers"><span>🖥️</span> Serwery Discord</a>
          <a href="#/logs" data-route="logs"><span>📜</span> Logi / Historia</a>
          <a href="#/diagnostics" data-route="diagnostics"><span>🩺</span> Diagnostyka</a>
          <a href="#/settings" data-route="settings"><span>⚙️</span> Ustawienia</a>
        </nav>
        <div class="sidebar-footer">
          <div class="status-pill" id="bot-status-pill">
            <span class="dot"></span> Bot: <span id="bot-status-text">…</span>
          </div>
        </div>
      </aside>

      <main class="content">
        <header class="topbar">
          <button class="hamburger" id="hamburger" aria-label="Menu">☰</button>
          <div class="topbar-title" id="page-title">Dashboard</div>
          <div class="topbar-actions">
            <button class="btn btn-ghost" id="refresh-btn" title="Sprawdź teraz">🔄 Sprawdź teraz</button>
          </div>
        </header>
        <div id="view" class="view"></div>
      </main>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <div id="modal-root"></div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
