<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: system-ui, sans-serif; width: 260px; padding: 14px; background: #0d1117; color: #e6edf3; }
      h3 { margin: 0 0 10px; font-size: 15px; }
      button { width: 100%; padding: 8px; background: #5865f2; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
      button:hover { background: #4752c4; }
      button:disabled { opacity: .6; cursor: not-allowed; }
      .status { font-size: 12px; color: #9aa7b4; margin: 10px 0; line-height: 1.5; }
      .ok { color: #3fb950; }
      .err { color: #f85149; }
      a { color: #5865f2; text-decoration: none; }
    </style>
  </head>
  <body>
    <h3>🔔 Discord Notify — IG Sync</h3>
    <div class="status" id="status">Ładowanie…</div>
    <button id="sync">Wyślij teraz</button>
    <p class="status"><a href="#" id="openOptions">Ustawienia wtyczki</a></p>
    <script src="popup.js"></script>
  </body>
</html>
